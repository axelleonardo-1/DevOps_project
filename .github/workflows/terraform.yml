name: Terraform Infrastructure

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_project_name: devops-ecommerce
      TF_VAR_environment: github-actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Validate Terraform configuration
        run: terraform validate

  plan:
    name: Terraform Plan
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_project_name: devops-ecommerce
      TF_VAR_environment: ${{ github.event_name == 'pull_request' && 'pull-request' || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Run Terraform plan
        # Plan previews infrastructure changes without creating or modifying resources.
        run: terraform plan -input=false -no-color

  apply:
    name: Terraform Apply
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Manual approval is configured in GitHub repository settings:
    # Settings > Environments > production
    environment:
      name: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_project_name: devops-ecommerce
      TF_VAR_environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Apply Terraform changes
        # Apply makes real infrastructure changes and is restricted to main only.
        run: terraform apply -input=false -auto-approve
