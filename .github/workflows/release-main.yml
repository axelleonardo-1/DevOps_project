name: Release Main

on:
  push:
    branches:
      - main

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment:
      name: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_project_name: devops-ecommerce
      TF_VAR_environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Apply Terraform changes
        run: terraform apply -input=false -auto-approve

  deploy-products:
    name: Deploy Products to Production
    needs: terraform-apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/products
    outputs:
      products_url: ${{ steps.deploy.outputs.worker_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/products/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve shared Cloudflare bindings
        id: bindings
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: devops-ecommerce-prod
          R2_BUCKET_NAME: devops-ecommerce-product-images-prod
        run: |
          D1_DATABASE_ID="$(npx wrangler d1 list --json | node -e "let data='';process.stdin.on('data', chunk => data += chunk);process.stdin.on('end', () => { const databases = JSON.parse(data); const match = databases.find((database) => database.name === process.env.D1_DATABASE_NAME); if (!match) { console.error('Missing D1 database: ' + process.env.D1_DATABASE_NAME); process.exit(1); } process.stdout.write(match.uuid || match.id || ''); });")"

          if [ -z "${D1_DATABASE_ID}" ]; then
            echo "Failed to resolve the production D1 database ID."
            exit 1
          fi

          echo "d1_database_id=${D1_DATABASE_ID}" >> "$GITHUB_OUTPUT"
          echo "d1_database_name=${D1_DATABASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "r2_bucket_name=${R2_BUCKET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Render Wrangler config
        env:
          D1_DATABASE_ID: ${{ steps.bindings.outputs.d1_database_id }}
          D1_DATABASE_NAME: ${{ steps.bindings.outputs.d1_database_name }}
          R2_BUCKET_NAME: ${{ steps.bindings.outputs.r2_bucket_name }}
        run: node ../../scripts/render-wrangler-config.mjs products production wrangler.ci.toml

      - name: Apply shared D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --env production --config wrangler.ci.toml

      - name: Deploy Worker to Cloudflare production
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deploy --env production --config wrangler.ci.toml 2>&1 | tee deploy.log
          WORKER_URL="$(node ../../scripts/extract-workers-url.mjs deploy.log)"
          echo "worker_url=${WORKER_URL}" >> "$GITHUB_OUTPUT"

  deploy-orders:
    name: Deploy Orders to Production
    needs: deploy-products
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orders
    outputs:
      orders_url: ${{ steps.deploy.outputs.worker_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/orders/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve shared Cloudflare bindings
        id: bindings
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: devops-ecommerce-prod
          PRODUCTS_SERVICE_URL: ${{ needs.deploy-products.outputs.products_url }}
        run: |
          if [ -z "${PRODUCTS_SERVICE_URL}" ]; then
            echo "Missing products URL from deploy-products job."
            exit 1
          fi

          D1_DATABASE_ID="$(npx wrangler d1 list --json | node -e "let data='';process.stdin.on('data', chunk => data += chunk);process.stdin.on('end', () => { const databases = JSON.parse(data); const match = databases.find((database) => database.name === process.env.D1_DATABASE_NAME); if (!match) { console.error('Missing D1 database: ' + process.env.D1_DATABASE_NAME); process.exit(1); } process.stdout.write(match.uuid || match.id || ''); });")"

          if [ -z "${D1_DATABASE_ID}" ]; then
            echo "Failed to resolve the production D1 database ID."
            exit 1
          fi

          echo "d1_database_id=${D1_DATABASE_ID}" >> "$GITHUB_OUTPUT"
          echo "d1_database_name=${D1_DATABASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "products_service_url=${PRODUCTS_SERVICE_URL}" >> "$GITHUB_OUTPUT"

      - name: Render Wrangler config
        env:
          D1_DATABASE_ID: ${{ steps.bindings.outputs.d1_database_id }}
          D1_DATABASE_NAME: ${{ steps.bindings.outputs.d1_database_name }}
          PRODUCTS_SERVICE_URL: ${{ steps.bindings.outputs.products_service_url }}
        run: node ../../scripts/render-wrangler-config.mjs orders production wrangler.ci.toml

      - name: Apply shared D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --env production --config wrangler.ci.toml

      - name: Deploy Worker to Cloudflare production
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deploy --env production --config wrangler.ci.toml 2>&1 | tee deploy.log
          WORKER_URL="$(node ../../scripts/extract-workers-url.mjs deploy.log)"
          echo "worker_url=${WORKER_URL}" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend to Production
    needs:
      - deploy-products
      - deploy-orders
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for production
        env:
          VITE_API_MODE: direct
          VITE_APP_ENV: prod
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_PRODUCTS_API_URL: ${{ needs.deploy-products.outputs.products_url }}
          VITE_ORDERS_API_URL: ${{ needs.deploy-orders.outputs.orders_url }}
          VITE_API_GATEWAY_URL: ${{ needs.deploy-products.outputs.products_url }}
        run: npm run build

      - name: Deploy to Cloudflare Pages production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
