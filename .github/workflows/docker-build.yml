name: Docker Build and Publish

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  docker:
    name: Docker ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            repository: devops-ecommerce-frontend
          - name: products
            context: ./services/products
            dockerfile: ./services/products/Dockerfile
            repository: devops-ecommerce-products
          - name: orders
            context: ./services/orders
            dockerfile: ./services/orders/Dockerfile
            repository: devops-ecommerce-orders

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker metadata
        id: meta
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/_' '--')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "branch=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            IMAGE_NAME="${{ matrix.image.repository }}"
          else
            IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repository }}"
          fi

          TAGS="${IMAGE_NAME}:${{ steps.meta.outputs.branch }},${IMAGE_NAME}:${{ steps.meta.outputs.short_sha }}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub secrets
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are required for push builds."
            exit 1
          fi

      - name: Build image for validation
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: ${{ steps.tags.outputs.image_name }}:pr-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
