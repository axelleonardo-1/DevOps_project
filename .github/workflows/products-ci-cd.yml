name: Products CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  ci:
    name: Products CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/products

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/products/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint if available
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script defined for services/products"
          fi

      - name: Run unit tests
        run: npm test

      - name: Run build if available
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script defined for services/products"
          fi

      - name: Run typecheck if available
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.typecheck ? 0 : 1)"; then
            npm run typecheck
          else
            echo "No typecheck script defined for services/products"
          fi

  deploy-development:
    name: Deploy Products to Development
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: development
    defaults:
      run:
        working-directory: services/products

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/products/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve shared Cloudflare bindings
        id: bindings
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: devops-ecommerce-dev
          R2_BUCKET_NAME: devops-ecommerce-product-images-dev
        run: |
          D1_DATABASE_ID="$(npx wrangler d1 list --json | node -e "let data='';process.stdin.on('data', chunk => data += chunk);process.stdin.on('end', () => { const databases = JSON.parse(data); const match = databases.find((database) => database.name === process.env.D1_DATABASE_NAME); if (!match) { console.error('Missing D1 database: ' + process.env.D1_DATABASE_NAME); process.exit(1); } process.stdout.write(match.uuid || match.id || ''); });")"

          if [ -z "${D1_DATABASE_ID}" ]; then
            echo "Failed to resolve the development D1 database ID."
            exit 1
          fi

          echo "d1_database_id=${D1_DATABASE_ID}" >> "$GITHUB_OUTPUT"
          echo "d1_database_name=${D1_DATABASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "r2_bucket_name=${R2_BUCKET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Render Wrangler config
        env:
          D1_DATABASE_ID: ${{ steps.bindings.outputs.d1_database_id }}
          D1_DATABASE_NAME: ${{ steps.bindings.outputs.d1_database_name }}
          R2_BUCKET_NAME: ${{ steps.bindings.outputs.r2_bucket_name }}
        run: node ../../scripts/render-wrangler-config.mjs products dev wrangler.ci.toml

      - name: Apply shared D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --env dev --config wrangler.ci.toml

      - name: Seed shared D1 development data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute DB --remote --env dev --config wrangler.ci.toml --file=./seeds/products.seed.sql

      - name: Deploy Worker to Cloudflare development
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env dev --config wrangler.ci.toml
