name = "products-service"
main = "src/index.js"
compatibility_date = "2026-05-06"

[vars]
APP_VERSION = "2.0.0"
PRODUCTS_STORAGE_DRIVER = "d1"
MAX_PRODUCT_IMAGE_BYTES = "5242880"

[env.dev]
name = "products-service-dev"

[env.dev.vars]
APP_VERSION = "2.0.0-dev"
PRODUCTS_STORAGE_DRIVER = "d1"
MAX_PRODUCT_IMAGE_BYTES = "5242880"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "products-db-dev"
database_id = "00000000-0000-0000-0000-000000000101"
preview_database_id = "00000000-0000-0000-0000-000000000111"
migrations_dir = "migrations"

[[env.dev.r2_buckets]]
binding = "PRODUCT_IMAGES_BUCKET"
bucket_name = "products-images-dev"

[env.production]
name = "products-service-prod"

[env.production.vars]
APP_VERSION = "2.0.0"
PRODUCTS_STORAGE_DRIVER = "d1"
MAX_PRODUCT_IMAGE_BYTES = "5242880"

[[env.production.d1_databases]]
binding = "DB"
database_name = "products-db-prod"
database_id = "00000000-0000-0000-0000-000000000201"
preview_database_id = "00000000-0000-0000-0000-000000000211"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "PRODUCT_IMAGES_BUCKET"
bucket_name = "products-images-prod"
