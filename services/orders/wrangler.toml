name = "orders-service"
main = "src/index.js"
compatibility_date = "2026-05-06"

[vars]
APP_VERSION = "2.0.0"
ORDERS_STORAGE_DRIVER = "d1"
PRODUCTS_SERVICE_URL = "http://localhost:3001"
PAYMENT_DELAY_MS = "25"

[env.dev]
name = "orders-service-dev"

[env.dev.vars]
APP_VERSION = "2.0.0-dev"
ORDERS_STORAGE_DRIVER = "d1"
PRODUCTS_SERVICE_URL = "http://localhost:3001"
PAYMENT_DELAY_MS = "10"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "orders-db-dev"
database_id = "00000000-0000-0000-0000-000000000301"
preview_database_id = "00000000-0000-0000-0000-000000000311"
migrations_dir = "migrations"

[env.production]
name = "orders-service-prod"

[env.production.vars]
APP_VERSION = "2.0.0"
ORDERS_STORAGE_DRIVER = "d1"
PRODUCTS_SERVICE_URL = "https://replace-products-service.example.com"
PAYMENT_DELAY_MS = "25"

[[env.production.d1_databases]]
binding = "DB"
database_name = "orders-db-prod"
database_id = "00000000-0000-0000-0000-000000000401"
preview_database_id = "00000000-0000-0000-0000-000000000411"
migrations_dir = "migrations"
